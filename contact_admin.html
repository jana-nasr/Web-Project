  <h1>Contact Us</h1>
  <p>If you are having trouble logging in or have any questions, please send us a message below.</p>

  <form>
    <div>
      <label for="name">Name: </label>
      <input type="text" id="name" name="name" placeholder="Your Name" required>
    </div>

    <br>

    <div>
      <label for="email">Email: </label>
      <input type="email" id="email" name="email" placeholder="someone@something.com" required>
    </div>

    <br>

    <div>
      <label for="message">Message: </label>
      <br>
      <textarea id="message" name="message" rows="5" cols="30" placeholder="How can we help you?" required></textarea>
    </div>

    <br>

    <div>
      <input type="submit" value="Send Message">
    </div>
  </form>
