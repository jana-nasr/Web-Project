<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
</head>
<body>

  <div align="left">
    <a href="login.html">
      <button type="button">Back to User Login</button>
    </a>
  </div>

  <div align="center">
      
      <h1>Admin Login</h1>

     <form action="admin.html">
       
       <div> 
         <label for="admin_user">Admin Username: </label>
         <input type="text" id="admin_user" name="admin_user" placeholder="Enter Admin ID" required>
       </div> 
       
       <br>

       <div>
         <label for="admin_pass">Admin Password: </label>
         <input type="password" id="admin_pass" name="admin_pass" required>
       </div>

       <br>

       <div>
         <input type="submit" value="Secure Log In">
       </div>

     </form>

  </div>

</body>
</html>
