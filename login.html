<!DOCTYPE html>
<html>
<head>
    <title>Login forum</title>
    <style>
        
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #DBDAD5; /* Beige Background */
            color: #00192F; /* Navy Text */
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Forces body to take full height of the screen */
        }

        nav {
            background-color: #00192F; /* Navy */
            padding: 15px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        nav a {
            color: #DBDAD5; /* Beige */
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #9AB5AE; /* Green on hover */
        }

        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1; /* Allows this section to grow and push the footer down */
            padding: 20px;
        }

        .loginForum {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-top: 5px solid #4C6665; /* Spruce accent */
            border-radius: 6px;
            padding: 40px 30px;
            box-shadow: 0 10px 20px rgba(0, 25, 47, 0.15); /* Soft Navy shadow */
            text-align: center;
        }

        .loginForum h1 {
            margin-top: 0;
            color: #00192F; /* Navy */
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #4C6665; /* Spruce */
        }

        .input-group input[type="email"], 
        .input-group input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #9AB5AE; /* Green */
            border-radius: 4px;
            box-sizing: border-box;
            background-color: #f9f9f9;
        }

        .input-group input[type="email"]:focus, 
        .input-group input[type="password"]:focus {
            outline: none;
            border-color: #4C6665; /* Spruce */
        }

        input[type="submit"] {
            width: 100%;
            background-color: #A26D5D; /* Brown */
            color: #fff;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        input[type="submit"]:hover {
            background-color: #4C6665; /* Spruce */
        }

        .loginForum a {
            color: #A26D5D; /* Brown */
            text-decoration: none;
        }
        
        .loginForum a:hover {
            text-decoration: underline;
        }

        footer {
            background-color: #00192F; /* Navy */
            color: #DBDAD5; /* Beige */
            text-align: center;
            padding: 20px;
            margin-top: auto; /* Automatically pushes to the bottom of the flex container */
        }

        footer a {
            color: #9AB5AE; /* Green */
            text-decoration: none;
        }

        footer a:hover {
            color: #A26D5D; /* Brown */
        }
    </style>
    
    <script>
        function checkAdmin(event) {
            // Get the typed email
            var emailValue = document.getElementById('email').value.trim().toLowerCase();
            
            // Check if it's the admin
            if (emailValue === 'admin@onlinelibrary.com') {
                event.preventDefault(); // Stop normal form submit
                window.location.href = 'Home_Admin.html'; // Send to Admin page
                return false; 
            }
            
            // If it's not admin, let the form submit normally to home.html
            return true;
        }
    </script>
</head>
<body>

    <nav>
        <img src="logo.png" alt="Logo" class="logo" width="50" height="50" style="margin-right: 20px;">
        <a href="Home.html">Home</a>
        <a href="About Us (4).html">About Us</a>
        <a href="servicess (2).html">Books</a>
        <a href="login.html">Login</a>
    </nav>

    <div class="login-wrapper">
        <div class="loginForum">
            <h1>Login</h1>
            
            <form action="home.html" onsubmit="return checkAdmin(event)">
                <div class="input-group"> 
                    <label for="email">Email: </label>
                    <input type="email" id="email" name="email" placeholder="someone@something.com" required>
                </div> 
                
                <div class="input-group">
                    <label for="password">Password: </label>
                    <input type="password" id="password" name="pass" maxlength="20" placeholder="max 20 char" required>
                </div>

                <div style="margin-top: 20px;">
                    <input type="submit" value="Log In">
                </div>

                <div style="margin-top: 15px;">
                    <p>Need help? <a href="contact.html">Contact Us</a></p>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Online Library. All rights reserved.</p>
        <p>
            Quick Links<br>
            <a href="Home.html">Home</a> | 
            <a href="About Us (4).html">About</a> | 
            <a href="servicess (2).html">Books</a> | 
            <a href="contact.html">Contact Us</a>
        </p>
        <p>Email: info@onlinelibrary.com</p>
    </footer>

</body>
</html>
